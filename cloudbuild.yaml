options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the arkham governance service image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/arkham/arkham:$COMMIT_SHA'
      - -t
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/arkham/arkham:latest'
      - -f
      - services/arkham/Dockerfile
      - .
    id: build

  # Push image to the working Artifact Registry repository.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/arkham/arkham'
    id: push
    waitFor: [build]

  # Deploy to Cloud Run — migration runs inside start.sh before uvicorn
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - arkham
      - --image=us-central1-docker.pkg.dev/${PROJECT_ID}/arkham/arkham:$COMMIT_SHA
      - --region=us-central1
      - --project=${PROJECT_ID}
      - --no-allow-unauthenticated
      - --add-cloudsql-instances=arkham-492414:us-central1:arkham-db
      - --vpc-egress=private-ranges-only
      - --network=default
      - --subnet=default
      - --memory=512Mi
      - --cpu=1
      - --max-instances=3
      - --set-secrets=DATABASE_URL=fs-ai-database-url:latest,BLOODS_VAULT_KEY=arkham-vault-key:latest,SIDECAR_SERVICE_TOKEN=arkham-sidecar-api-token:latest
      - --set-env-vars=APP_ENV=production,SIDECAR_SHADOW_MODE=true,BLOODS_ENABLED=true
    id: deploy
    waitFor: [push]

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/arkham/arkham:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/arkham/arkham:latest'
